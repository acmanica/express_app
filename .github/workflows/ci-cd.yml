name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Tests on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger deployment webhook
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: curl --fail --silent --show-error --location --request POST "$DEPLOY_WEBHOOK_URL"

      - name: Skip deploy when webhook is missing
        if: ${{ secrets.DEPLOY_WEBHOOK_URL == '' }}
        run: echo "DEPLOY_WEBHOOK_URL no esta configurado. CI ejecutado; CD omitido."
